<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>셀러 로그인</title>
</head>
<body>
<h1>셀러 로그인</h1>

<div id="error-message" style="color: red; display: none;"></div>

<form id="login-form">
    <div>
        <label for="email">이메일</label>
        <input type="email" id="email" />
    </div>
    <div>
        <label for="rawPassword">비밀번호</label>
        <input type="password" id="rawPassword" />
    </div>
    <button type="submit">로그인</button>
</form>

<div id="token-result" style="display: none;">
    <h2>로그인 성공</h2>
    <p>액세스 토큰: <code id="access-token"></code></p>
    <p>리프레시 토큰: <code id="refresh-token"></code></p>
</div>

<p><a href="/sellers/signup">회원가입으로 이동</a></p>

<script>
    const ERROR_MESSAGES = {
        SELLER_NOT_FOUND: '존재하지 않는 이메일입니다.',
        INVALID_PASSWORD: '비밀번호가 일치하지 않습니다.',
    };

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const errorEl = document.getElementById('error-message');
        errorEl.style.display = 'none';

        const res = await fetch('/api/sellers/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                rawPassword: document.getElementById('rawPassword').value,
            }),
        });

        if (res.status === 200) {
            const { accessToken, refreshToken } = await res.json();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('access-token').textContent = accessToken;
            document.getElementById('refresh-token').textContent = refreshToken;
            document.getElementById('token-result').style.display = 'block';
        } else if (res.status === 401) {
            const { code } = await res.json();
            errorEl.textContent = ERROR_MESSAGES[code] ?? '인증에 실패했습니다.';
            errorEl.style.display = 'block';
        } else if (res.status === 400) {
            errorEl.textContent = '입력값을 확인해주세요.';
            errorEl.style.display = 'block';
        }
    });
</script>
</body>
</html>
